{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        MACES
      {% endblock %}
    </title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'home/css/base.css' %}" />
     <!-- Bloco para incluir estilos específicos de cada página -->
    {% block styles %}
    {% endblock %}
  </head>
  <body>
    <div class="wrapper">
      <header>
        <nav>
          <div class="logo">
            <a href="{% url 'hero' %}">MACES</a>
          </div>
          <div class="menu-icon" id="menu-icon">
            &#9776; <!-- Ícone de hambúrguer -->
          </div>
          <ul class="nav-links" id="nav-links">
            <li>
              <a href="{% url 'hero' %}">Home</a>
            </li>
            <li>
              <a href="{% url 'about' %}">Sobre</a>
            </li>
            <li>
              <a href="{% url 'services' %}">Serviços</a>
            </li>
            <li>
              <a href="{% url 'contact' %}">Contato</a>
            </li>
            <li>
              <a href="{% url 'login' %}" class="login">Login</a>
            </li>
            <li>
              <a href="{% url 'register' %}" class="register">Registra-se</a>
            </li>
          </ul>
        </nav>
      </header>

      <main>
        {% block content %}

        {% endblock %}
      </main>

      <footer>
        <p>&copy; 2024 MACES. Todos os direitos reservados.</p>
      </footer>
    </div>
    <script src="{% static 'home/js/script.js' %}"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script> <!-- Inclua Font Awesome para os ícones -->
    <!-- Bloco para incluir scripts específicos de cada página -->
    {% block scripts %}
    {% endblock %}
  </body>
</html>
